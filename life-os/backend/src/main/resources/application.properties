server.port=8080

# =========================
# H2 DATABASE
# =========================

spring.datasource.url=jdbc:h2:file:./data/lifeosdb

spring.datasource.driver-class-name=org.h2.Driver

spring.datasource.username=sa

spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

spring.h2.console.enabled=true

spring.h2.console.path=/h2-console

# =========================
# JPA
# =========================

spring.jpa.hibernate.ddl-auto=update

spring.jpa.show-sql=false

spring.jpa.properties.hibernate.format_sql=true

# =========================
# JWT
# =========================

jwt.secret=5A7134743777217A25432A46294A404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970337336763979244226452948404D635166546A57

jwt.expiration=86400000

jwt.refresh-expiration=604800000

# =========================
# CORS
# =========================

app.cors.allowed-origins=http://localhost:3000,http://localhost:3001,http://localhost:5173

# =========================
# LOGGING
# =========================

logging.level.com.lifeos=DEBUG

logging.level.org.springframework.security=WARN